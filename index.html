<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>出席登録</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      min-height: 100vh;
    }

    .screen {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
      text-align: center;
      gap: 12px;
    }
    .screen.active { display: flex; }

    h1 { font-size: 1.2rem; color: #e2e8f0; }
    .info { color: #94a3b8; font-size: 0.9rem; }

    #qr-reader { width: min(300px, 90vw); }

    #video {
      width: min(400px, 100%);
      border-radius: 12px;
      background: #1e293b;
    }

    .shutter-btn {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: #fff;
      border: 5px solid #94a3b8;
      cursor: pointer;
      margin-top: 8px;
      flex-shrink: 0;
    }
    .shutter-btn:disabled {
      background: #475569;
      border-color: #334155;
      cursor: not-allowed;
    }
    .shutter-btn:active:not(:disabled) { background: #e2e8f0; }

    #photo-preview { width: min(400px, 100%); border-radius: 12px; }

    .done-icon { font-size: 4rem; color: #34d399; }

    .btn {
      padding: 14px 28px;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      width: min(360px, 100%);
    }
    .btn-green  { background: #059669; color: #fff; }
    .btn-slate  { background: #334155; color: #e2e8f0; }
    .btn-red    { background: #dc2626; color: #fff; }
    .btn:active { opacity: 0.85; }

    .err-msg {
      color: #fca5a5;
      font-size: 0.95rem;
      line-height: 1.8;
      white-space: pre-line;
    }

    /* ── デバッグパネル ─── */
    #dbg-toggle {
      position: fixed;
      bottom: 8px; right: 8px;
      background: rgba(0,0,0,0.5);
      color: #94a3b8;
      font-size: 0.7rem;
      padding: 4px 8px;
      border-radius: 4px;
      cursor: pointer;
      z-index: 1000;
      user-select: none;
    }
    #dbg-panel {
      display: none;
      position: fixed;
      bottom: 36px; left: 0; right: 0;
      background: rgba(0,0,0,0.85);
      color: #a3e635;
      font-size: 0.72rem;
      font-family: monospace;
      padding: 8px;
      z-index: 999;
      max-height: 40vh;
      overflow-y: auto;
      text-align: left;
    }
    #dbg-panel div { border-bottom: 1px solid #1e293b; padding: 2px 0; }
  </style>
</head>
<body>

<!-- ① QRスキャン画面 -->
<div id="screen-scan" class="screen active">
  <h1>出席登録</h1>
  <div id="session-label" class="info">授業情報を読み込み中...</div>
  <div id="qr-reader"></div>
  <div class="info" style="margin-top:8px;">QRコードをカメラに向けてください</div>
</div>

<!-- ② カメラ撮影画面 -->
<div id="screen-camera" class="screen">
  <h1>写真を撮影してください</h1>
  <div id="camera-student" class="info"></div>
  <video id="video" autoplay playsinline muted></video>
  <div id="camera-status" class="info" style="font-size:0.8rem;">カメラ準備中...</div>
  <button class="shutter-btn" id="shutter-btn" onclick="onShutter()" disabled></button>
</div>

<!-- ③ 写真確認画面 -->
<div id="screen-preview" class="screen">
  <h1>写真を確認してください</h1>
  <img id="photo-preview" src="" alt="撮影写真">
  <div id="preview-info" class="info"></div>
  <button class="btn btn-green" onclick="onSubmit()">✓ この写真で出席を記録する</button>
  <button class="btn btn-slate" onclick="onRetake()">📷 撮り直す</button>
</div>

<!-- ④ 完了画面 -->
<div id="screen-done" class="screen">
  <div class="done-icon">✓</div>
  <h1>出席完了！</h1>
  <div id="done-name" style="font-size:1.3rem; font-weight:700;"></div>
  <div id="done-info" class="info"></div>
  <div id="done-timer" class="info" style="margin-top:8px;"></div>
</div>

<!-- ⑤ エラー画面 -->
<div id="screen-err" class="screen">
  <div style="font-size:3rem;">❌</div>
  <div id="err-msg" class="err-msg"></div>
  <button class="btn btn-red" onclick="onRetry()">再試行する</button>
</div>

<!-- デバッグパネル -->
<div id="dbg-toggle" onclick="document.getElementById('dbg-panel').style.display = document.getElementById('dbg-panel').style.display==='none'?'block':'none'">ログ</div>
<div id="dbg-panel"></div>

<!-- html5-qrcode -->
<script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

<script type="module">
  import { initializeApp }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, doc, getDoc, setDoc, serverTimestamp }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  /* ── Firebase ───────────────────────────────── */
  const app = initializeApp({
    apiKey:            "AIzaSyC53vX0o0chwAy3ZwkD4a8tNBcyep0C5ew",
    authDomain:        "attendance-system-a9569.firebaseapp.com",
    projectId:         "attendance-system-a9569",
    storageBucket:     "attendance-system-a9569.firebasestorage.app",
    messagingSenderId: "123698437186",
    appId:             "1:123698437186:web:9ed2f21af3dfb67e9421db"
  });
  const db = getFirestore(app);

  /* ── 画面ログ（Android用） ───────────────────── */
  function dbg(msg) {
    console.log(msg);
    const panel = document.getElementById('dbg-panel');
    const line = document.createElement('div');
    line.textContent = new Date().toLocaleTimeString('ja') + '  ' + msg;
    panel.insertBefore(line, panel.firstChild);
    // 最大20行
    while (panel.children.length > 20) panel.removeChild(panel.lastChild);
  }

  /* ── Global state ───────────────────────────── */
  let capturedPhoto  = null;
  let currentStudent = null;
  let activeSession  = null;
  let cameraStream   = null;
  let qrScanner      = null;
  let qrLocked       = false;

  /* ── Screen switch ──────────────────────────── */
  function show(id) {
    ['scan','camera','preview','done','err'].forEach(s => {
      const el = document.getElementById('screen-' + s);
      if (s === id) el.classList.add('active');
      else          el.classList.remove('active');
    });
  }

  /* ── Stop camera ────────────────────────────── */
  function stopCamera() {
    if (cameraStream) {
      cameraStream.getTracks().forEach(t => t.stop());
      cameraStream = null;
    }
    document.getElementById('video').srcObject = null;
  }

  /* ── Error screen ───────────────────────────── */
  function showErr(msg) {
    dbg('ERROR: ' + msg.replace(/\n/g, ' '));
    stopCamera();
    document.getElementById('err-msg').textContent = msg;
    show('err');
  }

  /* ── Start QR scan ──────────────────────────── */
  async function startScan() {
    dbg('--- startScan ---');
    capturedPhoto  = null;
    currentStudent = null;
    qrLocked       = false;
    stopCamera();

    if (qrScanner) {
      try { await qrScanner.stop(); } catch (_) {}
      qrScanner = null;
    }
    document.getElementById('qr-reader').innerHTML = '';
    show('scan');

    // アクティブセッションを取得
    try {
      const snap = await getDoc(doc(db, 'config', 'activeSession'));
      if (snap.exists() && snap.data().active) {
        activeSession = snap.data();
        document.getElementById('session-label').textContent =
          activeSession.className + '　' + activeSession.date;
        dbg('session: ' + activeSession.className);
      } else {
        activeSession = null;
        document.getElementById('session-label').textContent = '⚠ 授業が設定されていません';
        dbg('session: none');
      }
    } catch (e) {
      document.getElementById('session-label').textContent = '接続エラー';
      dbg('session error: ' + e.message);
    }

    // QRスキャン開始
    qrScanner = new Html5Qrcode('qr-reader');
    const cfg = { fps: 10, qrbox: { width: 250, height: 250 } };
    try {
      await qrScanner.start({ facingMode: 'environment' }, cfg, onQR, () => {});
      dbg('QR scanner started (back camera)');
    } catch (_) {
      try {
        await qrScanner.start({ facingMode: 'user' }, cfg, onQR, () => {});
        dbg('QR scanner started (front camera)');
      } catch (e) {
        showErr('カメラへのアクセスが許可されていません。\nブラウザの設定を確認してください。');
      }
    }
  }

  /* ── QR detected ────────────────────────────── */
  async function onQR(text) {
    if (qrLocked) return;
    qrLocked = true;
    dbg('QR: ' + text.trim());

    try { await qrScanner.stop(); } catch (_) {}

    const studentId = text.trim();

    // 名簿から学生情報を取得
    let snap;
    try {
      snap = await getDoc(doc(db, 'students', studentId));
    } catch (e) {
      showErr('名簿の取得に失敗しました。\nネットワーク接続を確認してください。');
      return;
    }
    if (!snap.exists()) {
      showErr('名簿に登録されていない学籍番号です。\n学籍番号: ' + studentId);
      return;
    }
    currentStudent = { id: studentId, ...snap.data() };
    dbg('student: ' + currentStudent.name);

    if (!activeSession) {
      showErr('授業が設定されていません。\n教員に確認してください。');
      return;
    }

    // フロントカメラ起動
    show('camera');
    document.getElementById('camera-student').textContent =
      currentStudent.name + '　' + currentStudent.id;
    document.getElementById('camera-status').textContent = 'カメラ準備中...';
    document.getElementById('shutter-btn').disabled = true;

    try {
      cameraStream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 960 } },
        audio: false
      });
      const video = document.getElementById('video');
      video.srcObject = cameraStream;
      await video.play();
      dbg('video.play() done, w=' + video.videoWidth);

      // videoWidth が 0 の場合は loadedmetadata を待つ（Android対策）
      if (!video.videoWidth || !video.videoHeight) {
        dbg('waiting for loadedmetadata...');
        await new Promise(resolve => {
          video.addEventListener('loadedmetadata', resolve, { once: true });
          setTimeout(resolve, 5000); // 最大5秒待つ
        });
        dbg('loadedmetadata: w=' + video.videoWidth + ' h=' + video.videoHeight);
      }

      // 映像フレームが来るまで最大2秒ポーリング
      let waited = 0;
      while ((!video.videoWidth || !video.videoHeight) && waited < 2000) {
        await new Promise(r => setTimeout(r, 100));
        waited += 100;
      }

      dbg('camera ready: ' + video.videoWidth + 'x' + video.videoHeight);
      document.getElementById('camera-status').textContent =
        video.videoWidth + 'x' + video.videoHeight + ' ─ 撮影ボタンを押してください';
      document.getElementById('shutter-btn').disabled = false;

    } catch (e) {
      dbg('camera error: ' + e.message);
      showErr('フロントカメラへのアクセスに失敗しました。\nカメラの権限を確認してください。');
    }
  }

  /* ── Shutter ────────────────────────────────── */
  window.onShutter = function() {
    const video = document.getElementById('video');
    dbg('onShutter: ' + video.videoWidth + 'x' + video.videoHeight);

    if (!video.videoWidth || !video.videoHeight) {
      alert('カメラがまだ準備できていません。もう少し待ってから押してください。');
      return;
    }

    // 320×240に縮小してJPEG変換
    const TW = 320, TH = 240;
    const ratio = Math.min(TW / video.videoWidth, TH / video.videoHeight);
    const w = Math.round(video.videoWidth  * ratio);
    const h = Math.round(video.videoHeight * ratio);
    dbg('canvas: ' + w + 'x' + h);

    const canvas = document.createElement('canvas');
    canvas.width  = w;
    canvas.height = h;
    const ctx = canvas.getContext('2d');
    ctx.translate(w, 0);
    ctx.scale(-1, 1);
    ctx.drawImage(video, 0, 0, w, h);

    let quality = 0.65;
    capturedPhoto = canvas.toDataURL('image/jpeg', quality);
    while (capturedPhoto.length * 0.75 > 50 * 1024 && quality > 0.3) {
      quality -= 0.05;
      capturedPhoto = canvas.toDataURL('image/jpeg', quality);
    }

    const kb = Math.round(capturedPhoto.length * 0.75 / 1024);
    dbg('captured: ' + kb + 'KB q=' + quality.toFixed(2));
    dbg('prefix: ' + capturedPhoto.substring(0, 40));

    stopCamera();

    document.getElementById('photo-preview').src = capturedPhoto;
    document.getElementById('preview-info').textContent =
      currentStudent.name + '　' + currentStudent.id + '　約' + kb + 'KB';
    show('preview');
  };

  /* ── Submit ─────────────────────────────────── */
  window.onSubmit = async function() {
    dbg('onSubmit: photo=' + (capturedPhoto ? capturedPhoto.length + 'chars' : 'null'));
    dbg('student=' + (currentStudent ? currentStudent.id : 'null'));
    dbg('session=' + (activeSession ? activeSession.sessionId : 'null'));

    if (!capturedPhoto) {
      alert('写真データがありません。最初からやり直してください。');
      startScan();
      return;
    }
    if (!currentStudent || !activeSession) {
      alert('データが不足しています。最初からやり直してください。');
      startScan();
      return;
    }

    const ref = doc(db, 'attendance', activeSession.sessionId, 'records', currentStudent.id);

    // 重複チェック
    try {
      const existing = await getDoc(ref);
      if (existing.exists()) {
        dbg('DUPLICATE: already recorded');
        alert(currentStudent.name + ' は既に出席済みです。');
        startScan();
        return;
      }
    } catch (e) {
      dbg('dup check error: ' + e.message);
      alert('確認中にエラーが発生しました: ' + e.message);
      return;
    }

    // Firestoreに保存
    dbg('saving to Firestore...');
    try {
      await setDoc(ref, {
        id:        currentStudent.id,
        name:      currentStudent.name,
        faculty:   currentStudent.faculty,
        grade:     currentStudent.grade,
        year:      currentStudent.year,
        photo:     capturedPhoto,
        timestamp: serverTimestamp(),
        sessionId: activeSession.sessionId,
      });
      dbg('saved OK! photo=' + capturedPhoto.length + 'chars');
    } catch (e) {
      dbg('setDoc ERROR: ' + e.message);
      alert('保存に失敗しました: ' + e.message);
      return;
    }

    // 完了画面
    document.getElementById('done-name').textContent = currentStudent.name;
    document.getElementById('done-info').textContent =
      currentStudent.id + '　' + currentStudent.faculty + '　' + currentStudent.grade + '年';
    show('done');

    let sec = 5;
    document.getElementById('done-timer').textContent = sec + '秒後に自動リセット';
    const timer = setInterval(() => {
      sec--;
      if (sec <= 0) {
        clearInterval(timer);
        startScan();
      } else {
        document.getElementById('done-timer').textContent = sec + '秒後に自動リセット';
      }
    }, 1000);
  };

  /* ── Retake ─────────────────────────────────── */
  window.onRetake = async function() {
    dbg('onRetake');
    capturedPhoto = null;
    show('camera');
    document.getElementById('camera-status').textContent = 'カメラ準備中...';
    document.getElementById('shutter-btn').disabled = true;

    try {
      cameraStream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 960 } },
        audio: false
      });
      const video = document.getElementById('video');
      video.srcObject = cameraStream;
      await video.play();

      if (!video.videoWidth || !video.videoHeight) {
        await new Promise(resolve => {
          video.addEventListener('loadedmetadata', resolve, { once: true });
          setTimeout(resolve, 5000);
        });
      }

      let waited = 0;
      while ((!video.videoWidth || !video.videoHeight) && waited < 2000) {
        await new Promise(r => setTimeout(r, 100));
        waited += 100;
      }

      dbg('retake camera: ' + video.videoWidth + 'x' + video.videoHeight);
      document.getElementById('camera-status').textContent =
        video.videoWidth + 'x' + video.videoHeight + ' ─ 撮影ボタンを押してください';
      document.getElementById('shutter-btn').disabled = false;
    } catch (e) {
      dbg('retake camera error: ' + e.message);
      showErr('フロントカメラへのアクセスに失敗しました。');
    }
  };

  /* ── Retry ──────────────────────────────────── */
  window.onRetry = function() {
    dbg('onRetry');
    startScan();
  };

  /* ── Boot ───────────────────────────────────── */
  dbg('page loaded');
  startScan();
</script>
</body>
</html>
